<div class="contador">
<section class="contador">
    <h2>Personas acompañadas</h2>
    <div id="numero">0</div>
</section>

<script>
let contador = document.getElementById("numero");
let objetivo = 150; // Cambia este número

let actual = 0;

let intervalo = setInterval(() => {
    actual++;
    contador.textContent = actual + "+";

    if (actual >= objetivo) {
        clearInterval(intervalo);
    }
}, 20);
</script>

<style>
.contador{
    text-align:center;
    padding:40px;
}

#numero{
    font-size:60px;
    font-weight:bold;
    color:#8A2BE2;
}
</style>
